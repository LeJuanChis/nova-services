<section class="neo-hero">
  <div class="neo-hero__container">
    <div class="neo-hero__content">
      <span class="neo-hero__eyebrow">TECNOLOGÍA + EXPERIENCIA</span>
      <h1 class="neo-hero__title">Servicios premium con una visión futurista.</h1>
      <p class="neo-hero__description">Descubre asesorías, experiencias y soluciones tecnológicas que ayudarán a tu empresa a destacar en el mercado.</p>
      <div class="neo-hero__actions">
        <a class="neo-hero__button neo-hero__button--primary" routerLink="/servicios">Explorar servicios</a>
        <a class="neo-hero__button neo-hero__button--secondary" routerLink="/contactos">Hablar con nosotros</a>
      </div>
    </div>
    <div class="neo-hero__visual">
      <div class="neo-hero__orb"></div>
      <img class="neo-hero__image" [src]="imageUrl" alt="Visual principal del catálogo" />
    </div>
  </div>
</section>
